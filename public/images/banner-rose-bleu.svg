      </text>
    </g>
  </g>

  <g transform="translate(860 78)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="188" rx="24" fill="url(#cardA)" />
    <rect x="36" y="30" width="178" height="132" rx="18" fill="#ffe7dc" />
    <path d="M72 70 L94 48 L118 62 L132 52 L156 70 L168 92 L146 98 L146 146 L94 146 L94 98 L72 92 Z" fill="#ef7f7d" />
    <path d="M98 98 H142" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
    <text x="24" y="176" fill="#2b3f55" font-size="17" font-family="Trebuchet MS, Segoe UI, sans-serif">Look enfant</text>
  </g>

  <g transform="translate(1120 148)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="188" rx="24" fill="url(#cardB)" />
    <rect x="36" y="30" width="178" height="132" rx="18" fill="#deeeff" />
    <circle cx="125" cy="102" r="44" fill="#4d8fcb" />
    <circle cx="107" cy="94" r="7" fill="#ffffff" />
    <circle cx="143" cy="94" r="7" fill="#ffffff" />
    <path d="M106 119 C116 132, 134 132, 144 119" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" />
    <text x="24" y="176" fill="#2b3f55" font-size="17" font-family="Trebuchet MS, Segoe UI, sans-serif">Accessoires</text>
  </g>

  <g transform="translate(970 320)" filter="url(#shadow)">
