      <text x="34" y="37" fill="#ffffff" font-size="22" font-family="Trebuchet MS, Segoe UI, sans-serif" font-weight="700">
        Voir le shop
      </text>
    </g>

    <g transform="translate(236 228)">
      <rect x="0" y="0" rx="14" width="170" height="58" fill="#ffffff" stroke="#d7dfeb" stroke-width="2" />
      <text x="42" y="37" fill="#2a3a4f" font-size="22" font-family="Trebuchet MS, Segoe UI, sans-serif" font-weight="700">
