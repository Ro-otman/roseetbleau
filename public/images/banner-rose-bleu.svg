<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">Banniere Rose et Bleu</title>
  <desc id="desc">Banniere coloree pour boutique enfants Rose et Bleu avec style doux et moderne.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2e5" />
      <stop offset="55%" stop-color="#fbeaf2" />
      <stop offset="100%" stop-color="#e7f3ff" />
    </linearGradient>
    <linearGradient id="cta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea6a68" />
      <stop offset="100%" stop-color="#3f87c8" />
    </linearGradient>
    <linearGradient id="cardA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fff7fb" />
    </linearGradient>
    <linearGradient id="cardB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f9ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d2330" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect x="20" y="20" width="1400" height="520" rx="36" fill="url(#bg)" />

  <circle cx="100" cy="90" r="48" fill="#ffd3c2" opacity="0.7" />
  <circle cx="240" cy="70" r="20" fill="#ffd3c2" opacity="0.85" />
  <circle cx="1330" cy="100" r="60" fill="#cfe7ff" opacity="0.65" />
  <circle cx="1260" cy="70" r="24" fill="#cfe7ff" opacity="0.85" />

  <path d="M20 410 C220 350, 420 470, 620 420 C820 370, 1020 490, 1220 430 C1300 405, 1365 420, 1420 450 L1420 540 L20 540 Z" fill="#ffffff" opacity="0.5" />

  <g transform="translate(92 102)">
    <text x="0" y="0" fill="#192431" font-size="20" font-family="Trebuchet MS, Segoe UI, sans-serif" font-weight="700" letter-spacing="3">NOUVELLE SAISON</text>
    <text x="0" y="84" fill="#1c2a3a" font-size="68" font-family="Trebuchet MS, Segoe UI, sans-serif" font-weight="800">
