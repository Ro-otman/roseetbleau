    <text x="30" y="52" fill="#314259" font-size="20" font-family="Trebuchet MS, Segoe UI, sans-serif" font-weight="700">
      Capsule printemps
    </text>
    <text x="30" y="86" fill="#4a5f79" font-size="18" font-family="Trebuchet MS, Segoe UI, sans-serif">
      Tons roses et bleus, tailles 2 a 10 ans.
    </text>
    <rect x="30" y="102" width="160" height="30" rx="10" fill="#eef3fb" />
    <text x="45" y="123" fill="#32465f" font-size="15" font-family="Trebuchet MS, Segoe UI, sans-serif">
      Nouveautes chaque semaine
    </text>
